<body>

    userdata_1 = window.atob(window.atob("YUhSMGNITTZMeTlrWlhaa1kyOXljQzFqWVRZMk15NTNaV0l1WVhCd0x3PT0="))
    function openGame(url) {
        var win = window.open();
        win.document.open();
        win.document.write('<!DOCTYPE html><html><head><style>*{margin:0;padding:0;overflow:hidden;}html,body{width:100%;height:100%;background:black;}</style></head><body></body></html>');

            width: 100%;
            height: 100%;

        `;
